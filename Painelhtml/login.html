<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: url('/barber-background.jpg') no-repeat center center fixed; /* Mesmo fundo do HTML principal */
      background-size: cover; /* Ajusta a imagem para cobrir toda a tela */
      color: #fff; /* Texto branco para contraste */
    }
    form {
      background-color: rgba(0, 0, 0, 0.7); /* Fundo semitransparente */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5); /* Sombra para destaque */
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 300px;
    }
    .logo {
      width: 150px; /* Largura ajustada */
      height: auto; /* Mantém a proporção */
      margin-bottom: 20px; /* Espaço abaixo do logo */
    }
    label {
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #444; /* Botão escuro */
      color: #fff;
      transition: background-color 0.3s, transform 0.2s;
    }
    button:hover {
      background-color: #0e0d0d; /* Cor mais clara ao passar o mouse */
      transform: scale(1.05); /* Leve aumento ao passar o mouse */
    }
  </style>
</head>
<body>
  <form action="/login" method="POST">
    <img src="logo santana.jpg" alt="Logo Santana" class="logo"> <!-- Adicionado o logo -->
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">Login</button>
  </form>
</body>
</html>
